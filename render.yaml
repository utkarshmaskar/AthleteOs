# Render deployment config for AthleteOS
# Docs: https://render.com/docs/render-yaml-spec
# NOTE: Backend is deployed on Railway (see athleteos/railway.toml)
#       Only the static frontend is served here.

services:
  # ─── Frontend: static HTML/JS — always free on Render ───────────────────
  - type: web
    name: athleteos-frontend
    runtime: static
    rootDir: frontend
    staticPublishPath: .
    buildCommand: ""

    # Redirect all 404s to index.html for the SPA router
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
